<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PUNCH ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050508;
  --base: #0a0a0f;
  --surface: #111118;
  --elevated: #18181f;
  --border: #252530;
  --border-bright: #35354a;
  --text: #e0e0e8;
  --text-dim: #7a7a90;
  --text-ghost: #44445a;
  --red: #ff2d2d;
  --red-dim: #ff2d2d40;
  --red-glow: #ff2d2d22;
  --orange: #ff6b35;
  --orange-dim: #ff6b3540;
  --green: #00ff88;
  --green-dim: #00ff8830;
  --blue: #4da6ff;
  --blue-dim: #4da6ff30;
  --yellow: #ffd23f;
  --yellow-dim: #ffd23f30;
  --purple: #b46eff;
  --purple-dim: #b46eff30;
  --cyan: #00d4ff;
  --cyan-dim: #00d4ff30;
  --mono: 'IBM Plex Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 13px; }

body {
  background: var(--void);
  color: var(--text);
  font-family: var(--mono);
  line-height: 1.55;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

.arena { max-width: 1600px; margin: 0 auto; padding: 16px 20px 40px; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 16px; border-bottom: 1px solid var(--border);
  margin-bottom: 16px; animation: fadeSlideDown 0.6s var(--ease-out-expo) both;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo {
  font-size: 1.4rem; font-weight: 700; letter-spacing: 0.15em; color: var(--red);
  text-shadow: 0 0 30px var(--red-dim), 0 0 60px var(--red-glow); position: relative;
}
.logo::after {
  content: 'ARENA'; display: block; font-size: 0.5rem; font-weight: 400;
  letter-spacing: 0.5em; color: var(--text-dim); text-shadow: none; margin-top: -2px;
}
.header-status { display: flex; align-items: center; gap: 16px; font-size: 0.72rem; color: var(--text-dim); }
.health-badge {
  display: flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 3px;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
}
.health-badge.healthy { background: var(--green-dim); color: var(--green); border: 1px solid #00ff8820; }
.health-badge.degraded { background: var(--red-dim); color: var(--red); border: 1px solid #ff2d2d20; animation: pulse-red 2s ease-in-out infinite; }
.ws-dot { width: 7px; height: 7px; border-radius: 50%; transition: background 0.3s, box-shadow 0.3s; }
.ws-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green-dim); }
.ws-dot.disconnected { background: var(--red); box-shadow: 0 0 8px var(--red-dim); }
.uptime { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--text); min-width: 70px; }

.stats-row {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
  margin-bottom: 16px; animation: fadeSlideUp 0.5s var(--ease-out-expo) 0.1s both;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
  padding: 12px 12px 10px; position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.stat-card:hover { border-color: var(--border-bright); transform: translateY(-1px); }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card:nth-child(1)::before { background: var(--red); }
.stat-card:nth-child(2)::before { background: var(--orange); }
.stat-card:nth-child(3)::before { background: var(--green); }
.stat-card:nth-child(4)::before { background: var(--blue); }
.stat-card:nth-child(5)::before { background: var(--purple); }
.stat-card:nth-child(6)::before { background: var(--yellow); }
.stat-value {
  font-size: 1.5rem; font-weight: 700; line-height: 1; margin-bottom: 3px;
  font-variant-numeric: tabular-nums; transition: color 0.3s;
}
.stat-card:nth-child(1) .stat-value { color: var(--red); }
.stat-card:nth-child(2) .stat-value { color: var(--orange); }
.stat-card:nth-child(3) .stat-value { color: var(--green); }
.stat-card:nth-child(4) .stat-value { color: var(--blue); }
.stat-card:nth-child(5) .stat-value { color: var(--purple); }
.stat-card:nth-child(6) .stat-value { color: var(--yellow); }
.stat-label { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

.main-layout {
  display: grid; grid-template-columns: 320px 1fr; gap: 14px;
  animation: fadeSlideUp 0.5s var(--ease-out-expo) 0.2s both;
}

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--elevated);
}
.panel-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
.panel-count { font-size: 0.62rem; color: var(--text-ghost); font-weight: 400; }
.panel-body { padding: 10px; }

.sidebar { display: flex; flex-direction: column; gap: 14px; }

.fighters-grid { display: flex; flex-direction: column; gap: 6px; }
.fighter-card {
  display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px;
  padding: 8px 10px; background: var(--base); border: 1px solid var(--border); border-radius: 4px;
  transition: border-color 0.2s, background 0.2s; animation: fadeIn 0.3s var(--ease-out-expo) both;
}
.fighter-card:hover { border-color: var(--border-bright); background: var(--elevated); }
.fighter-card.fighting { border-color: var(--green); background: linear-gradient(135deg, var(--base), #041a0d); }
.fighter-card.knocked_out { border-color: var(--red); opacity: 0.7; }
.fighter-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fighter-status-dot.idle { background: var(--text-ghost); }
.fighter-status-dot.fighting { background: var(--green); box-shadow: 0 0 10px var(--green-dim); animation: pulse-dot 1.5s ease-in-out infinite; }
.fighter-status-dot.resting { background: var(--yellow); box-shadow: 0 0 6px var(--yellow-dim); }
.fighter-status-dot.knocked_out { background: var(--red); box-shadow: 0 0 6px var(--red-dim); }
.fighter-status-dot.training { background: var(--purple); box-shadow: 0 0 6px var(--purple-dim); animation: pulse-dot 2s ease-in-out infinite; }
.fighter-info { min-width: 0; }
.fighter-name { font-weight: 600; font-size: 0.8rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fighter-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 0.62rem; color: var(--text-dim); }
.fighter-model { color: var(--text-ghost); }
.weight-badge { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; }
.weight-badge.featherweight { color: var(--blue); background: var(--blue-dim); }
.weight-badge.middleweight { color: var(--yellow); background: var(--yellow-dim); }
.weight-badge.heavyweight { color: var(--orange); background: var(--orange-dim); }
.weight-badge.champion { color: var(--red); background: var(--red-dim); }
.fighter-status-label { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; white-space: nowrap; }
.fighter-status-label.idle { color: var(--text-ghost); }
.fighter-status-label.fighting { color: var(--green); }
.fighter-status-label.resting { color: var(--yellow); }
.fighter-status-label.knocked_out { color: var(--red); }
.fighter-status-label.training { color: var(--purple); }

.gorillas-grid { display: flex; flex-direction: column; gap: 6px; }
.gorilla-card {
  padding: 8px 10px; background: var(--base); border: 1px solid var(--border); border-radius: 4px;
  transition: border-color 0.2s; animation: fadeIn 0.3s var(--ease-out-expo) both;
}
.gorilla-card.rampaging { border-color: var(--red); animation: fadeIn 0.3s both, cage-shake 0.5s ease-in-out infinite; }
.gorilla-top { display: flex; align-items: center; justify-content: space-between; }
.gorilla-name { font-weight: 600; font-size: 0.78rem; }
.gorilla-status { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; }
.gorilla-status.caged { color: var(--text-ghost); border: 1px solid var(--border); }
.gorilla-status.rampaging { color: var(--red); background: var(--red-dim); animation: pulse-red 1.5s ease-in-out infinite; }
.gorilla-meta { font-size: 0.62rem; color: var(--text-ghost); margin-top: 2px; }

.config-grid { display: flex; flex-direction: column; }
.config-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #ffffff06; }
.config-row:last-child { border-bottom: none; }
.config-key { font-size: 0.62rem; color: var(--text-dim); }
.config-val { font-size: 0.65rem; color: var(--text); font-weight: 500; text-align: right; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.config-val.active { color: var(--green); }
.config-val.inactive { color: var(--text-ghost); }

.activity-area { display: flex; flex-direction: column; gap: 14px; }

.live-feed {
  display: flex; flex-direction: column; gap: 0; max-height: calc(100vh - 240px);
  overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.live-feed::-webkit-scrollbar { width: 4px; }
.live-feed::-webkit-scrollbar-track { background: transparent; }
.live-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.feed-item {
  display: grid; grid-template-columns: 70px auto 1fr 70px; align-items: start; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid #ffffff06;
  animation: feedSlideIn 0.25s var(--ease-out-expo) both;
  transition: background 0.15s;
}
.feed-item:hover { background: var(--elevated); }
.feed-item.highlight { background: #00ff8808; border-left: 2px solid var(--green); }
.feed-item.error-item { background: #ff2d2d08; border-left: 2px solid var(--red); }
.feed-item.msg-item { background: #4da6ff06; border-left: 2px solid var(--blue); }

.feed-time {
  font-size: 0.6rem; color: var(--text-ghost); font-variant-numeric: tabular-nums;
  padding-top: 2px; white-space: nowrap;
}

.feed-badge {
  font-size: 0.52rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; white-space: nowrap; text-align: center;
  min-width: 50px; display: inline-block;
}
.feed-badge.fighter_spawned { color: var(--cyan); background: var(--cyan-dim); }
.feed-badge.message_in { color: var(--blue); background: var(--blue-dim); }
.feed-badge.message_out { color: var(--green); background: var(--green-dim); }
.feed-badge.bout_started { color: var(--purple); background: var(--purple-dim); }
.feed-badge.bout_ended { color: var(--yellow); background: var(--yellow-dim); }
.feed-badge.tool_exec { color: var(--orange); background: var(--orange-dim); }
.feed-badge.gorilla_unleashed { color: var(--red); background: var(--red-dim); }
.feed-badge.gorilla_paused { color: var(--text-dim); background: #ffffff10; }
.feed-badge.troop_formed { color: var(--cyan); background: var(--cyan-dim); }
.feed-badge.troop_disbanded { color: var(--text-dim); background: #ffffff10; }
.feed-badge.combo { color: var(--purple); background: var(--purple-dim); }
.feed-badge.error { color: var(--red); background: var(--red-dim); }
.feed-badge.system_start { color: var(--green); background: var(--green-dim); }

.feed-content {
  font-size: 0.72rem; color: var(--text-dim); line-height: 1.5;
  word-break: break-word; min-width: 0;
}
.feed-content .msg-text { color: var(--text); display: block; margin-top: 2px; padding: 4px 8px; background: var(--base); border-radius: 3px; border-left: 2px solid var(--border); font-size: 0.68rem; max-height: 80px; overflow: hidden; }
.feed-content .msg-text.response { border-left-color: var(--green); }
.feed-content .msg-text.incoming { border-left-color: var(--blue); }

.feed-seq {
  font-size: 0.55rem; color: var(--text-ghost); font-variant-numeric: tabular-nums;
  text-align: right; padding-top: 2px;
}

.live-indicator {
  display: flex; align-items: center; gap: 6px; font-size: 0.6rem; color: var(--text-ghost);
}
.live-pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: pulse-dot 1.2s ease-in-out infinite;
}
.live-pulse.active { background: var(--green); }

.empty { color: var(--text-ghost); font-size: 0.72rem; padding: 20px 0; text-align: center; font-style: italic; }

.event-counters {
  display: flex; gap: 12px; flex-wrap: wrap; padding: 6px 0;
  font-size: 0.58rem; color: var(--text-dim);
}
.event-counter { display: flex; align-items: center; gap: 4px; }
.event-counter .dot { width: 5px; height: 5px; border-radius: 50%; }
.event-counter .count { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); }

@keyframes fadeSlideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes feedSlideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
@keyframes cage-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1px); } 75% { transform: translateX(1px); } }
@keyframes countUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 1100px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .main-layout { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  html { font-size: 12px; }
  .arena { padding: 10px 12px 32px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .header { flex-direction: column; gap: 10px; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="arena">

  <header class="header">
    <div class="header-left">
      <div class="logo">PUNCH</div>
      <div id="health-badge" class="health-badge healthy">
        <span id="ws-dot" class="ws-dot disconnected"></span>
        <span id="health-text">HEALTHY</span>
      </div>
    </div>
    <div class="header-status">
      <span>UPTIME <span id="uptime" class="uptime">00:00:00</span></span>
      <span style="color:var(--text-ghost)">|</span>
      <span id="last-refresh" style="color:var(--text-ghost)">--</span>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="stat-fighters">0</div><div class="stat-label">Fighters</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-gorillas">0</div><div class="stat-label">Gorillas</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-bouts">0</div><div class="stat-label">Active Bouts</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-messages">0</div><div class="stat-label">Messages</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-tokens">0</div><div class="stat-label">Tokens</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-cost">$0.00</div><div class="stat-label">Cost</div></div>
  </div>

  <div class="main-layout">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Fighter Roster</span><span class="panel-count" id="fighter-count">0</span></div>
        <div class="panel-body"><div id="fighters-content" class="fighters-grid"><div class="empty">No fighters spawned</div></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Gorillas</span><span class="panel-count" id="gorilla-count">0</span></div>
        <div class="panel-body"><div id="gorillas-content" class="gorillas-grid"><div class="empty">None registered</div></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Config</span></div>
        <div class="panel-body"><div id="config-content" class="config-grid"><div class="empty">Loading...</div></div></div>
      </div>
    </div>

    <div class="activity-area">
      <div class="panel" style="flex:1; display:flex; flex-direction:column;">
        <div class="panel-header">
          <div style="display:flex; align-items:center; gap:12px;">
            <span class="panel-title">Live Activity</span>
            <div class="live-indicator"><div id="live-pulse" class="live-pulse"></div><span id="live-status">connecting...</span></div>
          </div>
          <div id="event-counters" class="event-counters"></div>
        </div>
        <div class="panel-body" style="flex:1; padding:0;">
          <div id="live-feed" class="live-feed"><div class="empty">Waiting for events...</div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function() {
  "use strict";
  var BASE = window.location.origin;
  var uptimeSecs = 0;
  var uptimeInterval = null;
  var eventCounts = {};
  var maxFeedItems = 200;

  /* XSS-safe text escaping via textContent */
  function esc(s) {
    var d = document.createElement("span");
    d.textContent = String(s == null ? "" : s);
    return d.textContent;
  }

  function fetchJson(path) {
    return fetch(BASE + path).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
  }

  function fmtNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000) return (n / 1000).toFixed(1) + "K";
    return String(n);
  }

  function fmtUptime(secs) {
    var h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  function fmtCost(usd) {
    if (usd < 0.01) return "$" + usd.toFixed(4);
    if (usd < 1) return "$" + usd.toFixed(3);
    return "$" + usd.toFixed(2);
  }

  function fmtTime(ts) {
    try { var d = new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0"); }
    catch(e) { return "--:--:--"; }
  }

  function fmtSchedule(cron) {
    if (!cron) return "manual";
    if (cron.indexOf("*/5 ") === 0) return "every 5m";
    if (cron.indexOf("*/10 ") === 0) return "every 10m";
    if (cron.indexOf("*/15 ") === 0) return "every 15m";
    if (cron.indexOf("*/30 ") === 0) return "every 30m";
    return cron;
  }

  function animateStat(id, value) {
    var el = document.getElementById(id);
    if (!el) return;
    var display = String(value);
    if (el.textContent !== display) {
      el.style.animation = "none"; void el.offsetHeight;
      el.style.animation = "countUp 0.3s var(--ease-out-expo) both";
      el.textContent = display;
    }
  }

  var kindLabels = {
    fighter_spawned: "SPAWN", message_in: "MSG IN", message_out: "MSG OUT",
    bout_started: "BOUT", bout_ended: "DONE", tool_exec: "TOOL",
    gorilla_unleashed: "UNLEASH", gorilla_paused: "CAGED",
    troop_formed: "TROOP", troop_disbanded: "DISBAND",
    combo: "COMBO", error: "ERROR", system_start: "SYSTEM"
  };

  /* --- DOM BUILDER HELPERS (XSS-safe, no innerHTML for user data) --- */
  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function buildFeedItem(entry) {
    var kind = entry.kind || "system_event";
    var label = kindLabels[kind] || kind.toUpperCase();
    var isError = kind === "error";
    var isMsg = kind === "message_in" || kind === "message_out";

    var row = el("div", "feed-item" + (isError ? " error-item" : isMsg ? " msg-item" : ""));

    row.appendChild(el("span", "feed-time", fmtTime(entry.timestamp)));
    row.appendChild(el("span", "feed-badge " + kind, label));

    var content = el("span", "feed-content");
    if (isMsg) {
      var msgBox = el("span", "msg-text " + (kind === "message_in" ? "incoming" : "response"), entry.summary);
      content.appendChild(msgBox);
    } else {
      content.textContent = entry.summary;
    }
    row.appendChild(content);

    row.appendChild(el("span", "feed-seq", "#" + (entry.sequence || 0)));
    return row;
  }

  function buildFighterCard(f, i) {
    var st = (f.status || "idle").toLowerCase();
    var card = el("div", "fighter-card " + st);
    card.style.animationDelay = (i * 40) + "ms";
    card.title = f.description || "";

    card.appendChild(el("div", "fighter-status-dot " + st));

    var info = el("div", "fighter-info");
    info.appendChild(el("div", "fighter-name", f.name));
    var meta = el("div", "fighter-meta");
    meta.appendChild(el("span", "weight-badge " + (f.weight_class || ""), f.weight_class || ""));
    meta.appendChild(el("span", "fighter-model", f.model || ""));
    info.appendChild(meta);
    card.appendChild(info);

    card.appendChild(el("div", "fighter-status-label " + st, st));
    return card;
  }

  function buildGorillaCard(g) {
    var st = (g.status || "caged").toLowerCase();
    var card = el("div", "gorilla-card " + st);

    var top = el("div", "gorilla-top");
    top.appendChild(el("span", "gorilla-name", g.name));
    top.appendChild(el("span", "gorilla-status " + st, st));
    card.appendChild(top);

    card.appendChild(el("div", "gorilla-meta", fmtSchedule(g.schedule)));
    return card;
  }

  function buildConfigRow(key, val) {
    var row = el("div", "config-row");
    row.appendChild(el("span", "config-key", key));
    var vc = "";
    if (val === "on") vc = " active";
    if (val === "off" || val === "0") vc = " inactive";
    row.appendChild(el("span", "config-val" + vc, val));
    return row;
  }

  /* --- RENDER FUNCTIONS --- */
  function renderStatus(data) {
    if (!data) return;
    uptimeSecs = data.uptime_secs || 0;
    document.getElementById("uptime").textContent = fmtUptime(uptimeSecs);
    var badge = document.getElementById("health-badge"), text = document.getElementById("health-text");
    if (data.system_health === "healthy") { badge.className = "health-badge healthy"; text.textContent = "HEALTHY"; }
    else { badge.className = "health-badge degraded"; text.textContent = "DEGRADED"; }
    animateStat("stat-fighters", data.fighter_count);
    animateStat("stat-gorillas", data.gorilla_count);
    animateStat("stat-bouts", data.active_bouts);
    animateStat("stat-messages", fmtNum(data.total_messages));
  }

  function renderMetrics(data) {
    if (!data) return;
    animateStat("stat-tokens", fmtNum(data.total_tokens_used));
    animateStat("stat-cost", fmtCost(data.total_cost_usd));
  }

  function renderFighters(data) {
    var container = document.getElementById("fighters-content");
    container.replaceChildren();
    if (!data || data.length === 0) { container.appendChild(el("div", "empty", "No fighters spawned")); document.getElementById("fighter-count").textContent = "0"; return; }
    for (var i = 0; i < data.length; i++) container.appendChild(buildFighterCard(data[i], i));
    document.getElementById("fighter-count").textContent = String(data.length);
  }

  function renderGorillas(data) {
    var container = document.getElementById("gorillas-content");
    container.replaceChildren();
    if (!data || data.length === 0) { container.appendChild(el("div", "empty", "None registered")); document.getElementById("gorilla-count").textContent = "0"; return; }
    for (var i = 0; i < data.length; i++) container.appendChild(buildGorillaCard(data[i]));
    document.getElementById("gorilla-count").textContent = String(data.length);
  }

  function renderConfig(data) {
    var container = document.getElementById("config-content");
    container.replaceChildren();
    if (!data) { container.appendChild(el("div", "empty", "Unavailable")); return; }
    var dm = data.default_model || {};
    var rows = [
      ["Provider", dm.provider || "\u2014"], ["Model", dm.model || "\u2014"],
      ["Endpoint", dm.base_url || "default"], ["Max Tokens", String(dm.max_tokens || "\u2014")],
      ["Temp", String(dm.temperature || "\u2014")], ["Rate", (data.rate_limit_rpm || 0) + " rpm"],
      ["Listen", data.api_listen || "\u2014"], ["Memory", data.memory_db_path || "\u2014"],
      ["KG", data.knowledge_graph_enabled ? "on" : "off"]
    ];
    for (var i = 0; i < rows.length; i++) container.appendChild(buildConfigRow(rows[i][0], rows[i][1]));
  }

  function renderAuditFeed(data) {
    var feed = document.getElementById("live-feed");
    feed.replaceChildren();
    if (!data || data.length === 0) { feed.appendChild(el("div", "empty", "No events yet \u2014 spawn a fighter and send a message")); return; }
    for (var i = 0; i < data.length; i++) feed.appendChild(buildFeedItem(data[i]));
  }

  /* --- WEBSOCKET LIVE EVENTS --- */
  function wsKindToAuditKind(event) {
    switch (event.kind) {
      case "fighter_message": return event.role === "user" ? "message_in" : "message_out";
      case "tool_executed": return "tool_exec";
      case "combo_triggered": return "combo";
      default: return event.kind;
    }
  }

  function eventToSummary(event) {
    switch (event.kind) {
      case "fighter_spawned": return "Fighter '" + (event.name || "?") + "' entered the arena";
      case "fighter_message": return event.content_preview || "";
      case "gorilla_unleashed": return "Gorilla '" + (event.name || "?") + "' unleashed";
      case "gorilla_paused": return "Gorilla paused: " + (event.reason || "");
      case "tool_executed": var st = event.success ? "OK" : "FAIL"; return (event.tool_name||"?") + " [" + st + "] (" + (event.duration_ms||0) + "ms)";
      case "bout_started": return "New bout started";
      case "bout_ended": return "Bout ended (" + (event.messages_exchanged || 0) + " tokens)";
      case "combo_triggered": return "Combo '" + (event.combo_name||"?") + "' by " + (event.triggered_by||"?");
      case "troop_formed": return "Troop '" + (event.name||"?") + "' (" + (event.member_count||0) + " members)";
      case "troop_disbanded": return "Troop '" + (event.name||"?") + "' disbanded";
      case "error": return "[" + (event.source || "?") + "] " + (event.message || "");
      default: return JSON.stringify(event);
    }
  }

  function appendLiveEvent(payload) {
    var event = payload.event;
    if (!event) return;

    var displayKind = wsKindToAuditKind(event);
    eventCounts[displayKind] = (eventCounts[displayKind] || 0) + 1;
    renderEventCounters();

    var entry = { sequence: "ws", timestamp: payload.timestamp, kind: displayKind, summary: eventToSummary(event) };

    var feed = document.getElementById("live-feed");
    if (!feed) return;

    var emptyEl = feed.querySelector(".empty");
    if (emptyEl) emptyEl.remove();

    feed.insertBefore(buildFeedItem(entry), feed.firstChild);

    while (feed.children.length > maxFeedItems) feed.removeChild(feed.lastChild);
  }

  function renderEventCounters() {
    var container = document.getElementById("event-counters");
    container.replaceChildren();
    var order = ["fighter_spawned","message_in","message_out","bout_started","bout_ended","tool_exec","error"];
    var labels = {fighter_spawned:"spawns",message_in:"in",message_out:"out",bout_started:"bouts",bout_ended:"done",tool_exec:"tools",error:"errors"};
    var colors = {fighter_spawned:"var(--cyan)",message_in:"var(--blue)",message_out:"var(--green)",bout_started:"var(--purple)",bout_ended:"var(--yellow)",tool_exec:"var(--orange)",error:"var(--red)"};
    for (var i = 0; i < order.length; i++) {
      var k = order[i];
      if (eventCounts[k]) {
        var span = el("span", "event-counter");
        var dot = el("span", "dot");
        dot.style.background = colors[k] || "var(--text-ghost)";
        span.appendChild(dot);
        span.appendChild(el("span", "count", String(eventCounts[k])));
        span.appendChild(document.createTextNode(labels[k] || k));
        container.appendChild(span);
      }
    }
  }

  function startUptimeTicker() {
    if (uptimeInterval) clearInterval(uptimeInterval);
    uptimeInterval = setInterval(function() { uptimeSecs++; document.getElementById("uptime").textContent = fmtUptime(uptimeSecs); }, 1000);
  }

  function refreshPanels() {
    Promise.all([
      fetchJson("/api/dashboard/status"), fetchJson("/api/dashboard/metrics"),
      fetchJson("/api/dashboard/fighters"), fetchJson("/api/dashboard/gorillas"),
      fetchJson("/api/dashboard/config")
    ]).then(function(r) {
      renderStatus(r[0]); renderMetrics(r[1]); renderFighters(r[2]);
      renderGorillas(r[3]); renderConfig(r[4]);
      document.getElementById("last-refresh").textContent = new Date().toLocaleTimeString();
    });
  }

  function fullRefresh() {
    refreshPanels();
    fetchJson("/api/dashboard/audit?limit=50").then(function(data) { renderAuditFeed(data); });
  }

  function connectWS() {
    var dot = document.getElementById("ws-dot");
    var pulse = document.getElementById("live-pulse");
    var status = document.getElementById("live-status");
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    var ws;
    try { ws = new WebSocket(proto + "//" + location.host + "/api/dashboard/events"); } catch(e) { dot.className = "ws-dot disconnected"; return; }
    ws.onopen = function() { dot.className = "ws-dot connected"; pulse.className = "live-pulse active"; status.textContent = "live"; };
    ws.onclose = function() { dot.className = "ws-dot disconnected"; pulse.className = "live-pulse"; status.textContent = "reconnecting..."; setTimeout(connectWS, 3000); };
    ws.onerror = function() { ws.close(); };
    ws.onmessage = function(e) {
      try {
        var payload = JSON.parse(e.data);
        if (payload.event) appendLiveEvent(payload);
        pulse.style.animation = "none"; void pulse.offsetHeight;
        pulse.style.animation = "pulse-dot 0.4s ease-out";
        if (payload.event && (payload.event.kind === "fighter_message" || payload.event.kind === "bout_started" || payload.event.kind === "bout_ended" || payload.event.kind === "fighter_spawned")) {
          refreshPanels();
        }
      } catch(err) { refreshPanels(); }
    };
  }

  fullRefresh();
  startUptimeTicker();
  setInterval(refreshPanels, 10000);
  connectWS();
})();
</script>
</body>
</html>
