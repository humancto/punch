name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross (for Linux cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../punch-${{ matrix.target }}.${{ matrix.archive }} punch
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: punch-${{ matrix.target }}
          path: punch-${{ matrix.target }}.${{ matrix.archive }}

  publish-github:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          name: "Punch ${{ github.ref_name }} — The First Punch"
          body_path: CHANGELOG.md
          files: |
            punch-*.tar.gz

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in punch-types punch-memory punch-skills punch-extensions punch-wire punch-runtime punch-kernel punch-arena punch-channels punch-gorillas punch-cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || true
            sleep 30
          done

  update-homebrew:
    name: Update Homebrew tap
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute SHA-256 hashes and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          SHA_AARCH64_DARWIN=$(sha256sum punch-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_DARWIN=$(sha256sum punch-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(sha256sum punch-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum punch-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          VERSION="${RELEASE_TAG#v}"

          cat > punch.rb << 'HEREDOC'
          class Punch < Formula
            desc "The Agent Combat System — deploy autonomous AI agent squads from a single binary"
            homepage "https://github.com/humancto/punch"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/humancto/punch/releases/download/TAG_PLACEHOLDER/punch-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_AARCH64_DARWIN_PLACEHOLDER"
              else
                url "https://github.com/humancto/punch/releases/download/TAG_PLACEHOLDER/punch-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_X86_64_DARWIN_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/humancto/punch/releases/download/TAG_PLACEHOLDER/punch-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_AARCH64_LINUX_PLACEHOLDER"
              else
                url "https://github.com/humancto/punch/releases/download/TAG_PLACEHOLDER/punch-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_64_LINUX_PLACEHOLDER"
              end
            end

            def install
              bin.install "punch"
            end

            test do
              assert_match "punch", shell_output("#{bin}/punch --version")
            end
          end
          HEREDOC

          # Remove leading whitespace from heredoc and substitute placeholders
          sed -i 's/^          //' punch.rb
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" punch.rb
          sed -i "s/TAG_PLACEHOLDER/${RELEASE_TAG}/g" punch.rb
          sed -i "s/SHA_AARCH64_DARWIN_PLACEHOLDER/${SHA_AARCH64_DARWIN}/g" punch.rb
          sed -i "s/SHA_X86_64_DARWIN_PLACEHOLDER/${SHA_X86_64_DARWIN}/g" punch.rb
          sed -i "s/SHA_AARCH64_LINUX_PLACEHOLDER/${SHA_AARCH64_LINUX}/g" punch.rb
          sed -i "s/SHA_X86_64_LINUX_PLACEHOLDER/${SHA_X86_64_LINUX}/g" punch.rb

          # Get current file SHA for update
          CURRENT_SHA=$(gh api repos/humancto/homebrew-tap/contents/Formula/punch.rb --jq '.sha')

          # Push updated formula
          gh api repos/humancto/homebrew-tap/contents/Formula/punch.rb \
            --method PUT \
            --field message="Update punch to ${RELEASE_TAG}" \
            --field content="$(base64 -w0 punch.rb)" \
            --field sha="${CURRENT_SHA}" \
            --field branch="main"
