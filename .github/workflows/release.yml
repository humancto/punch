name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../punch-${{ matrix.target }}.${{ matrix.archive }} punch
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: punch-${{ matrix.target }}
          path: punch-${{ matrix.target }}.${{ matrix.archive }}

  publish-github:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            punch-*.tar.gz

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in punch-types punch-memory punch-skills punch-extensions punch-wire punch-runtime punch-kernel punch-api punch-channels punch-gorillas punch-cli; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || true
            sleep 30
          done

  update-homebrew:
    name: Update Homebrew tap
    needs: publish-github
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "Homebrew tap update for tag $TAG_NAME"
          echo "Configure humancto/homebrew-punch repository with formula"
